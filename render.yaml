services:
  - type: web
    name: app-financeiro
    env: node
    buildCommand: npm install && npm run build
    startCommand: node app.js
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: app-financeiro-db
          property: connectionString

databases:
  - name: app-financeiro-db
    databaseName: appfinanceiro
    user: appfinanceiro
    plan: free

